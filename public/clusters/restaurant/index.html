<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Restaurant Ops - Management Cluster</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#3F49C1",
                        "primary-dark": "#2E37A4",
                        "primary-light": "rgba(63, 73, 193, 0.1)",
                        background: "#F4F6FB",
                        surface: "#FFFFFF",
                        "text-dark": "#1A1A1A",
                        "text-muted": "#7D848D",
                        outline: "#E8EBF2",
                        secondary: "#10B981"
                    },
                    borderRadius: { 'DEFAULT': '12px', 'lg': '16px', 'xl': '24px' },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'] }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-background text-text-dark font-sans min-h-screen">

    <aside class="fixed left-0 top-0 bottom-0 w-64 bg-surface border-r border-outline flex-col p-6 z-50 flex">
        <div class="flex items-center gap-2 mb-10">
            <div class="w-8 h-8 bg-secondary rounded-lg flex items-center justify-center text-white font-bold">R</div>
            <span class="text-xl font-extrabold tracking-tight text-secondary">Dining Ops</span>
        </div>
        <nav class="space-y-1">
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-primary-light text-primary rounded-xl font-semibold">
                <span class="material-symbols-outlined">restaurant</span>
                Orders Dispatch
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-text-muted hover:bg-background rounded-xl">
                <span class="material-symbols-outlined">menu_book</span>
                Menu Manager
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-text-muted hover:bg-background rounded-xl">
                <span class="material-symbols-outlined">grid_view</span>
                Table Map
            </a>
        </nav>
    </aside>

    <main class="ml-64 p-10 space-y-8">
        <header class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold text-secondary">Restaurant Dashboard</h1>
                <p class="text-text-muted">Interlinked with Guest & Logistics Clusters</p>
            </div>
            <div class="flex gap-4">
                <div class="bg-surface p-4 rounded-2xl border border-outline shadow-sm text-center min-w-[120px]">
                    <p class="text-[10px] font-bold text-text-muted uppercase">Active Orders</p>
                    <p id="activeOrderCount" class="text-2xl font-black text-secondary">0</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-8">
            <!-- Active Orders -->
            <div class="col-span-4 flex flex-col gap-4">
                <h3 class="font-bold flex justify-between items-center">
                    Order Queue
                    <span class="text-[10px] bg-secondary text-white px-2 py-0.5 rounded-full">LIVE</span>
                </h3>
                <div id="orderQueue" class="space-y-4">
                    <!-- Loading... -->
                </div>
            </div>

            <!-- Table Map & Menu -->
            <div class="col-span-8 space-y-8">
                <!-- Floor Map -->
                <div class="bg-surface p-6 rounded-3xl border border-outline shadow-sm">
                    <h3 class="font-bold mb-6">Floor Management</h3>
                    <div class="grid grid-cols-4 gap-4 aspect-video">
                        <div class="bg-primary-light border-2 border-primary rounded-2xl flex flex-col items-center justify-center text-primary">
                            <span class="text-xs font-black">T-01</span>
                            <span class="text-[10px]">Occupied</span>
                        </div>
                        <div class="bg-background border-2 border-outline rounded-2xl flex flex-col items-center justify-center text-text-muted">
                            <span class="text-xs font-black">T-02</span>
                            <span class="text-[10px]">Free</span>
                        </div>
                        <div class="bg-background border-2 border-outline rounded-2xl flex flex-col items-center justify-center text-text-muted">
                            <span class="text-xs font-black">T-03</span>
                            <span class="text-[10px]">Free</span>
                        </div>
                        <div class="bg-red-50 border-2 border-red-200 rounded-2xl flex flex-col items-center justify-center text-red-500">
                            <span class="text-xs font-black">T-04</span>
                            <span class="text-[10px]">Reserved</span>
                        </div>
                    </div>
                </div>

                <!-- Menu Toggles -->
                <div class="bg-surface p-6 rounded-3xl border border-outline shadow-sm">
                    <h3 class="font-bold mb-6">Quick Availability</h3>
                    <div id="menuList" class="space-y-3">
                        <!-- Loaded via API -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = "https://ep-patient-moon-a4h8ty8m.apirest.us-east-1.aws.neon.tech/neondb/rest/v1";
        const AUTH_TOKEN = "PROTOTYPE_BYPASS";

        async function apiFetch(path, options = {}) {
            const headers = { 'Authorization': `Bearer ${AUTH_TOKEN}`, 'Content-Type': 'application/json', ...options.headers };
            const res = await fetch(`${API_BASE}${path}`, { ...options, headers });
            return res.json();
        }

        async function loadOrders() {
            const orders = await apiFetch('/restaurant_orders?order=id.desc&limit=10');
            const queue = document.getElementById('orderQueue');
            queue.innerHTML = orders.map(o => `
                <div class="bg-surface p-4 rounded-2xl border border-outline shadow-sm space-y-3 border-l-4 ${
                    o.status === 'New' ? 'border-primary' : 'border-secondary'
                }">
                    <div class="flex justify-between items-start">
                        <p class="font-black text-sm">${o.ref}</p>
                        <span class="text-[10px] font-extrabold bg-background px-2 py-0.5 rounded border border-outline">${o.table_no}</span>
                    </div>
                    <p class="text-xs text-text-muted line-clamp-2">${o.items}</p>
                    <div class="flex justify-between items-center pt-2">
                        <p class="font-bold text-secondary text-sm">₹${o.total}</p>
                        <button onclick="updateOrder(${o.id}, 'Ready')" class="text-[10px] font-bold bg-secondary text-white px-3 py-1.5 rounded-lg">MARK READY</button>
                    </div>
                </div>
            `).join('') || '<p class="text-center text-text-muted py-10">No active orders.</p>';
            
            document.getElementById('activeOrderCount').textContent = orders.filter(o => o.status === 'New').length;
        }

        async function loadMenu() {
            // Mocking menu list for now or fetching from neondb if table exists
            const menu = [
                { id: 1, name: "Jharkhand Thali", available: true },
                { id: 2, name: "Smoked Paneer Tikka", available: true },
                { id: 3, name: "Millet Kheer", available: false }
            ];
            const list = document.getElementById('menuList');
            list.innerHTML = menu.map(m => `
                <div class="flex justify-between items-center p-3 hover:bg-background rounded-xl transition-colors">
                    <p class="font-bold text-sm ${m.available ? '' : 'line-through text-text-muted'}">${m.name}</p>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" ${m.available ? 'checked' : ''} class="sr-only peer">
                        <div class="w-9 h-5 bg-outline peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-secondary"></div>
                    </label>
                </div>
            `).join('');
        }

        async function updateOrder(id, status) {
            await apiFetch(`/restaurant_orders?id=eq.${id}`, {
                method: 'PATCH',
                body: JSON.stringify({ status })
            });
            loadOrders();
        }

        function init() {
            loadOrders();
            loadMenu();
        }

        init();
        setInterval(loadOrders, 5000);
    </script>
</body>
</html>
