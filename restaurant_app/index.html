<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant Ops - VoyageCore</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  </head>
  <body>
    <div id="app">
      <nav class="top-nav">
        <div class="logo"><span class="material-icons">restaurant</span> Dining Ops</div>
        <div class="user-profile">KITCHEN DISPLAY</div>
      </nav>

      <main class="container">
        <header class="page-header">
          <h1>Active Orders & Menus</h1>
          <button class="btn-new">Refresh Sync</button>
        </header>

        <section class="db-data-section">
          <h2>Menus from Shared DB</h2>
          <div class="cards-grid" id="restaurants-grid">
            <p>Loading restaurant menus...</p>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
